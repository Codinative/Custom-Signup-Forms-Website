<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 768" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9aa3b2"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1280" height="768" rx="20" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="1279" height="767" rx="20" fill="none" stroke="#e6e8ec"/>

  <!-- title -->
  <text x="40" y="54" font-size="26" font-weight="800" fill="#0c0e13">How Custom Signup Forms works</text>
  <text x="40" y="84" font-size="14" fill="#4a525e">From application to approved account - and a clear line between what the app does and what stays your BigCommerce setup.</text>

  <!-- ============ STEP CARDS ============ -->
  <!-- arrows -->
  <line x1="250" y1="240" x2="282" y2="240" stroke="#9aa3b2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="240" x2="532" y2="240" stroke="#9aa3b2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="240" x2="782" y2="240" stroke="#9aa3b2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1000" y1="240" x2="1032" y2="240" stroke="#9aa3b2" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 1 -->
  <g transform="translate(40,130)">
    <rect x="0" y="0" width="200" height="220" rx="14" fill="#ffffff" stroke="#e6e8ec"/>
    <circle cx="34" cy="40" r="18" fill="#3B82F6"/>
    <text x="34" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">1</text>
    <text x="20" y="96" font-size="15" font-weight="700" fill="#14181f">Build the form</text>
    <text x="20" y="122" font-size="12.5" fill="#4a525e"><tspan x="20" dy="0">Design fields, layout</tspan><tspan x="20" dy="17">and branding in the</tspan><tspan x="20" dy="17">visual builder - no code.</tspan></text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(290,130)">
    <rect x="0" y="0" width="200" height="220" rx="14" fill="#ffffff" stroke="#e6e8ec"/>
    <circle cx="34" cy="40" r="18" fill="#3B82F6"/>
    <text x="34" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">2</text>
    <text x="20" y="96" font-size="15" font-weight="700" fill="#14181f">Install the script</text>
    <text x="20" y="122" font-size="12.5" fill="#4a525e"><tspan x="20" dy="0">Add it in Script Manager.</tspan><tspan x="20" dy="17">It replaces the default</tspan><tspan x="20" dy="17">account signup form.</tspan></text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(540,130)">
    <rect x="0" y="0" width="200" height="220" rx="14" fill="#ffffff" stroke="#e6e8ec"/>
    <circle cx="34" cy="40" r="18" fill="#3B82F6"/>
    <text x="34" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">3</text>
    <text x="20" y="96" font-size="15" font-weight="700" fill="#14181f">Shopper applies</text>
    <text x="20" y="122" font-size="12.5" fill="#4a525e"><tspan x="20" dy="0">Visitor submits your</tspan><tspan x="20" dy="17">form (incl. file uploads).</tspan></text>
    <rect x="20" y="170" width="118" height="26" rx="13" fill="#f7f8fa" stroke="#e6e8ec"/>
    <text x="79" y="187" text-anchor="middle" font-size="11.5" font-weight="600" fill="#7b828f">No account yet</text>
  </g>

  <!-- Step 4 -->
  <g transform="translate(790,130)">
    <rect x="0" y="0" width="200" height="220" rx="14" fill="#ffffff" stroke="#e6e8ec"/>
    <circle cx="34" cy="40" r="18" fill="#3B82F6"/>
    <text x="34" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">4</text>
    <text x="20" y="96" font-size="15" font-weight="700" fill="#14181f">Review &amp; approve</text>
    <text x="20" y="122" font-size="12.5" fill="#4a525e"><tspan x="20" dy="0">Approve the request.</tspan><tspan x="20" dy="17">Optionally choose a</tspan><tspan x="20" dy="17">customer group.</tspan></text>
  </g>

  <!-- Step 5 -->
  <g transform="translate(1040,130)">
    <rect x="0" y="0" width="200" height="220" rx="14" fill="#ffffff" stroke="#e6e8ec"/>
    <circle cx="34" cy="40" r="18" fill="#0E9F6E"/>
    <text x="34" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">5</text>
    <text x="20" y="96" font-size="15" font-weight="700" fill="#14181f">Account created</text>
    <text x="20" y="122" font-size="12.5" fill="#4a525e"><tspan x="20" dy="0">BC customer created +</tspan><tspan x="20" dy="17">branded email. They set</tspan><tspan x="20" dy="17">a password &amp; sign in.</tspan></text>
    <rect x="20" y="170" width="128" height="26" rx="13" fill="#e2f5ec" stroke="#bfe9d6"/>
    <text x="84" y="187" text-anchor="middle" font-size="11.5" font-weight="600" fill="#0E9F6E">Account created</text>
  </g>

  <!-- divider -->
  <line x1="40" y1="392" x2="1240" y2="392" stroke="#eef0f3"/>

  <!-- ============ RESPONSIBILITY BAND ============ -->
  <!-- LEFT: app -->
  <g transform="translate(40,410)">
    <rect x="0" y="0" width="580" height="312" rx="16" fill="#EAF1FE" stroke="#C7DBFB"/>
    <text x="32" y="44" font-size="17" font-weight="800" fill="#2563EB">What the app handles</text>

    <g transform="translate(32,78)" fill="#1f2937" font-size="13.5">
      <circle cx="11" cy="-4" r="11" fill="#0E9F6E"/><path d="M6,-4 l3.4,3.4 L16,-9" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="0" font-weight="600">The custom signup form + file uploads</text>

      <g transform="translate(0,46)"><circle cx="11" cy="-4" r="11" fill="#0E9F6E"/><path d="M6,-4 l3.4,3.4 L16,-9" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="0" font-weight="600">The review &amp; approval queue</text></g>

      <g transform="translate(0,92)"><circle cx="11" cy="-4" r="11" fill="#0E9F6E"/><path d="M6,-4 l3.4,3.4 L16,-9" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="0" font-weight="600">Creating the approved BigCommerce customer</text></g>

      <g transform="translate(0,138)"><circle cx="11" cy="-4" r="11" fill="#0E9F6E"/><path d="M6,-4 l3.4,3.4 L16,-9" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="0" font-weight="600">A one-time, <tspan font-weight="800">optional</tspan> customer-group assignment</text></g>

      <g transform="translate(0,184)"><circle cx="11" cy="-4" r="11" fill="#0E9F6E"/><path d="M6,-4 l3.4,3.4 L16,-9" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="0" font-weight="600">Branded submission / approval / rejection emails</text></g>
    </g>
  </g>

  <!-- RIGHT: BigCommerce -->
  <g transform="translate(660,410)">
    <rect x="0" y="0" width="580" height="312" rx="16" fill="#f7f8fa" stroke="#e6e8ec"/>
    <text x="32" y="44" font-size="17" font-weight="800" fill="#14181f">What BigCommerce handles</text>

    <g transform="translate(32,76)">
      <circle cx="6" cy="-4" r="4" fill="#7b828f"/>
      <text x="26" y="0" font-size="13.5" font-weight="700" fill="#14181f">Login / sign-in</text>
      <text x="26" y="20" font-size="12.5" fill="#4a525e">No account exists until you approve - nothing to log into.</text>

      <g transform="translate(0,66)"><circle cx="6" cy="-4" r="4" fill="#7b828f"/>
      <text x="26" y="0" font-size="13.5" font-weight="700" fill="#14181f">Catalog &amp; price visibility</text>
      <text x="26" y="20" font-size="12.5" fill="#4a525e">Your “require login to see prices” setting + price lists.</text></g>

      <g transform="translate(0,132)"><circle cx="6" cy="-4" r="4" fill="#7b828f"/>
      <text x="26" y="0" font-size="13.5" font-weight="700" fill="#14181f">Ongoing customer-group membership</text>
      <text x="26" y="20" font-size="12.5" fill="#4a525e">e.g. pushed by your ERP / Acumatica connector. The app</text>
      <text x="26" y="38" font-size="12.5" fill="#4a525e">won't fight it - it never re-assigns groups after creation.</text></g>
    </g>
  </g>

  <!-- footer note -->
  <text x="640" y="752" text-anchor="middle" font-size="12.5" fill="#7b828f">The app controls <tspan font-style="italic">who</tspan> becomes an approved customer and in which group - it doesn't block login or hide prices, and it won't fight an ERP that owns group membership.</text>
</svg>
